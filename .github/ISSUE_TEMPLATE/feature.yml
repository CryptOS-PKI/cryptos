name: Feature / enhancement
description: Propose a new feature or enhancement
title: "feat: "
labels: ["enhancement"]
assignees: ["Bugs5382"]
body:
  - type: markdown
    attributes:
      value: |
        Every unit of work starts with **what** and **why**. Pick the phase
        below and add the matching `phase-N` label after creating (the form
        sets the type label automatically).
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: Which build phase does this belong to?
      options:
        - phase-1
        - phase-2
        - phase-3
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What
      description: What should be built or changed?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: The problem this solves or the value it adds.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done? (tests, behavior, checks)
    validations:
      required: false
