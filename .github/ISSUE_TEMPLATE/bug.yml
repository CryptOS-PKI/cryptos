name: Bug report
description: Report a defect
title: "fix: "
labels: ["bug"]
assignees: ["Bugs5382"]
body:
  - type: markdown
    attributes:
      value: |
        Pick the phase and add the matching `phase-N` label after creating.
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - phase-1
        - phase-2
        - phase-3
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The actual behavior, with any error output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (commands, config) to trigger it.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version/commit, architecture, host (QEMU vs bare metal), TPM type.
    validations:
      required: false
