name: Chore (build / CI / docs / refactor)
description: Tooling, build, CI, docs, refactor, or other non-feature work
title: "chore: "
labels: ["chore"]
assignees: ["Bugs5382"]
body:
  - type: markdown
    attributes:
      value: |
        For build/CI/docs/refactor/style/test work. Pick the phase and add
        the matching `phase-N` label after creating.
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - phase-1
        - phase-2
        - phase-3
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What
      description: What needs doing?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why it's worth doing now.
    validations:
      required: true
