name: Go CI (format, lint, vet, test, build)

# Go validation on a GitHub-hosted Linux runner. Mirrors `task ci`
# (fmt + lint + vet + test + build). Runs on PRs and pushes to main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-validation:
    name: Go validation (format, lint, vet, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install golangci-lint
        # Built from source with this job's Go (>= the go.mod version) so its
        # analyzers can load code that requires that Go; a prebuilt binary
        # built with an older Go panics on newer language/std usage.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: task ci
        run: task ci

      - name: Assert tree is clean (gofmt made no changes)
        run: git diff --exit-code
