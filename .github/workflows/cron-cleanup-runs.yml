name: Clean up workflow runs

# Prune the Actions run history daily:
#   - delete every failed run (failure / startup_failure / timed_out), any age;
#   - delete all other completed runs older than 7 days;
#   - never touch in-progress or queued runs.
# Manual dispatch supports a dry run that only reports what would be deleted.

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List what would be deleted without deleting"
        type: boolean
        default: false

permissions:
  # Required to delete workflow runs in this repository.
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune old and failed runs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Delete failed runs (any age) and other runs older than 7 days
        run: |
          set -euo pipefail
          cutoff=$(date -u -d '7 days ago' +%s)
          deleted=0 kept=0

          # id status conclusion created_at, one run per line, all pages.
          gh api --paginate \
            "/repos/${REPO}/actions/runs?per_page=100" \
            --jq '.workflow_runs[] | "\(.id) \(.status) \(.conclusion) \(.created_at)"' \
            > runs.txt

          while read -r id status conclusion created; do
            # Only completed runs are eligible; leave anything still running.
            [ "$status" = "completed" ] || { kept=$((kept+1)); continue; }

            failed=false
            case "$conclusion" in
              failure|startup_failure|timed_out) failed=true ;;
            esac

            ts=$(date -u -d "$created" +%s)
            old=false
            [ "$ts" -lt "$cutoff" ] && old=true

            if [ "$failed" = true ] || [ "$old" = true ]; then
              reason=$([ "$failed" = true ] && echo "$conclusion" || echo "older-than-7d")
              if [ "$DRY_RUN" = "true" ]; then
                echo "would delete run $id ($reason, $created)"
              else
                # Tolerate a run that vanishes between listing and deletion.
                gh api -X DELETE "/repos/${REPO}/actions/runs/${id}" \
                  && echo "deleted run $id ($reason, $created)" \
                  || echo "skip run $id (delete failed; may already be gone)"
              fi
              deleted=$((deleted+1))
            else
              kept=$((kept+1))
            fi
          done < runs.txt

          echo "---"
          if [ "$DRY_RUN" = "true" ]; then
            echo "dry run: $deleted run(s) would be deleted, $kept kept"
          else
            echo "deleted $deleted run(s), kept $kept"
          fi
