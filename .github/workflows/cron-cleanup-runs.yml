name: Clean up workflow runs

# Prune the Actions run history daily:
#   - delete every failed run, any age;
#   - delete all other runs older than 7 days.
# Manual dispatch supports a dry run that only reports what would be deleted.
#
# Uses Mattraks/delete-workflow-runs, pinned to a commit SHA (the action runs
# with actions:write, so it is pinned rather than tracking a mutable tag).

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List what would be deleted without deleting"
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune old and failed runs
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      # Failed runs, regardless of age (retain_days 0, no minimum kept).
      - name: Delete failed runs
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_run_by_conclusion_pattern: failure
          dry_run: ${{ env.DRY_RUN }}

      # Everything else older than 7 days (all conclusions, no minimum kept).
      - name: Delete runs older than 7 days
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 0
          dry_run: ${{ env.DRY_RUN }}
