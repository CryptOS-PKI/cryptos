name: Image build (kernel, rootfs, UKI, Secure Boot signing)

# Build the UKI on a GitHub-hosted runner. amd64 builds on ubuntu-latest;
# arm64 builds on the hosted ubuntu-24.04-arm runner (selectable via manual
# dispatch). The build toolchain (kernel deps, ukify, sbsign, mksquashfs) is
# installed per run — no pre-provisioned or self-hosted runner.
#
# Not triggered by pull_request: the kernel compile is expensive, so it runs
# on push to main, tags, and manual dispatch. Use workflow_dispatch on a
# branch to validate image changes before merging.

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Don't run an expensive image build for changes that can't affect the
    # image: docs, issue templates, and the sibling workflows. Editing
    # ci-image.yml itself still builds.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/ci-go.yml"
      - ".github/workflows/cron-cleanup-runs.yml"
      - ".github/workflows/release-drafter.yml"
      - ".github/release-drafter.yml"
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        default: amd64
        type: choice
        options: [amd64, arm64]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    name: Build and sign the UKI
    # amd64 -> ubuntu-latest (x86_64); arm64 -> the hosted arm64 runner.
    runs-on: ${{ (github.event.inputs.arch == 'arm64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    env:
      ARCH: ${{ github.event.inputs.arch || 'amd64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          # systemd-boot-efi provides the EFI stub ukify wraps the kernel in
          # (/usr/lib/systemd/boot/efi/linuxx64.efi.stub). cryptsetup is built
          # from source (Docker + Alpine), not installed here.
          # python3-pefile: ukify imports the Python `pefile` module and
          # systemd-ukify does not pull it in, so uki:assemble fails with
          # "ModuleNotFoundError: No module named 'pefile'" without it.
          sudo apt-get install -y --no-install-recommends \
            build-essential bc flex bison libelf-dev libssl-dev xz-utils \
            squashfs-tools sbsigntool systemd-ukify systemd-boot-efi cpio \
            python3-pefile

      - name: Install go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      # Cache the kernel source tree + build artifacts across runs so only
      # the first build pays the full compile cost.
      - name: Cache kernel build
        uses: actions/cache@v4
        with:
          path: build/.work/kernel
          key: kernel-${{ env.ARCH }}-${{ hashFiles('build/ci/versions.env', 'build/kernel/cryptos.config') }}

      - name: Generate SB key + machine config
        run: |
          set -euo pipefail
          mkdir -p build/.work/ci
          go build -o build/.work/ci/cryptos-sbkey ./cmd/cryptos-sbkey
          build/.work/ci/cryptos-sbkey --out-dir build/.work/ci \
            --cn "CryptOS Secure Boot (ephemeral CI)" --days 1
          # A throwaway bootstrap admin cert + a Phase 1 machine config.
          go build -o build/.work/ci/cryptosctl ./cmd/cryptosctl
          build/.work/ci/cryptosctl bootstrap --out-dir build/.work/ci >/dev/null
          fp=$(openssl x509 -in build/.work/ci/identity.crt -noout -fingerprint -sha256 \
                 | sed 's/.*=//; s/://g' | tr 'A-F' 'a-f')
          cat > build/.work/ci/machine.yaml <<YAML
          apiVersion: cryptos.dev/v1alpha1
          kind: MachineConfig
          metadata: {name: ci-root}
          role: {kind: root}
          network: {interface: eth0, address: 10.0.0.10/24, gateway: 10.0.0.1}
          storage: {state_partition_label: cryptos-state, first_boot: true}
          bootstrap: {admin_cert_sha256: "$fp"}
          pki:
            root_key_alg: ECDSA-P384
            root_subject: {common_name: "CryptOS CI Root", organization: "CI", country: "US"}
            root_validity_years: 20
            path_len_constraint: 2
          YAML

      - name: Build image
        env:
          SB_KEY: ${{ github.workspace }}/build/.work/ci/sb.key
          SB_CERT: ${{ github.workspace }}/build/.work/ci/sb.crt
          MACHINE_CONFIG: ${{ github.workspace }}/build/.work/ci/machine.yaml
        run: task image ARCH="$ARCH"

      # Per-run artifact (ephemeral, ~90-day retention) for every build —
      # the shakeout/smoke output, downloadable from the Actions run. On tag
      # pushes the publish-release job below also attaches it to the GitHub
      # Release as a durable, versioned asset.
      - name: Upload UKI artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cryptos-${{ env.ARCH }}-uki
          path: build/out/cryptos-${{ env.ARCH }}.uki
          if-no-files-found: error

  # On a tag push (a release the maintainer published, which created the tag, or
  # a bare `git push` tag), attach the Secure Boot-signed UKI to that tag's
  # GitHub Release as a durable, versioned asset. Release notes come from
  # Release Drafter (see release-drafter.yml): the maintainer publishes the
  # drafted release; this job attaches the artifact. If the tag has no release
  # yet, it creates one with notes generated from merged PRs.
  publish-release:
    name: Publish signed UKI to the release
    needs: build-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the release and upload the asset
    env:
      ARCH: ${{ github.event.inputs.arch || 'amd64' }}
    steps:
      - name: Download the signed UKI
        uses: actions/download-artifact@v4
        with:
          name: cryptos-${{ env.ARCH }}-uki
          path: dist

      - name: Attach the signed UKI to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          uki="dist/cryptos-${ARCH}.uki"
          [ -f "$uki" ] || { echo "missing $uki" >&2; exit 1; }
          # Attach to the release the maintainer published (Release Drafter
          # notes); create one with generated notes if the tag was pushed bare.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$uki" --clobber
          else
            gh release create "$TAG" "$uki" --verify-tag --generate-notes --title "$TAG"
          fi
